# GoReleaser config for opencode-fallback
# https://goreleaser.com
version: 2

project_name: opencode-fallback

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: opencode-fallback
    main: ./cmd/opencode-fallback
    binary: opencode-fallback
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: matiasblanca
    name: opencode-fallback
