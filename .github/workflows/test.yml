name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -count=1 ./...

  e2e-tests:
    name: E2E Tests (Full Proxy Stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run E2E tests
        run: go test -tags e2e -v -count=1 ./internal/proxy/ -run TestE2E

  e2e-windows:
    name: E2E Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run E2E tests
        run: go test -tags e2e -v -count=1 ./internal/proxy/ -run TestE2E
